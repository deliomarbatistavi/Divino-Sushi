<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divino Sushi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Noto Serif JP', serif;
background:linear-gradient(#0f0f0f,#1a0000);
color:#fff;
}

header{
background:linear-gradient(90deg,#8B0000,#000);
padding:25px;
text-align:center;
font-size:32px;
letter-spacing:3px;
border-bottom:2px solid #b30000;
}

.categoria{
margin:40px 20px 20px 20px;
}

.categoria h2{
border-left:5px solid #b30000;
padding-left:10px;
font-size:22px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.produto{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
transition:0.4s;
box-shadow:0 0 15px rgba(179,0,0,0.2);
position:relative;
}

.produto:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.produto img{
width:100%;
height:180px;
object-fit:cover;
}

.produto-content{
padding:15px;
}

button{
background:#b30000;
color:white;
border:none;
padding:10px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
width:100%;
}

button:hover{
background:#ff0000;
}

.controleProduto{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:8px;
}

.btnQtd{
background:#b30000;
border:none;
color:white;
width:35px;
height:35px;
font-size:18px;
border-radius:6px;
cursor:pointer;
}

.qtdProduto{
font-size:16px;
font-weight:bold;
width:30px;
text-align:center;
}

select,input{
width:100%;
padding:8px;
margin-top:8px;
border-radius:5px;
border:none;
}

#carrinho{
background:#111;
padding:20px;
margin-top:40px;
border-top:2px solid #b30000;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

#areaPix{
display:none;
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-top:15px;
}

/* carrinho flutuante */

#btnCarrinho{
position:fixed;
bottom:25px;
right:25px;
background:#b30000;
color:white;
border:none;
border-radius:50px;
padding:15px 20px;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,0.6);
z-index:9999;
}

#contadorCarrinho{
background:white;
color:#b30000;
border-radius:50%;
padding:3px 8px;
margin-left:6px;
font-weight:bold;
}

/* animação */

.animacao{
position:fixed;
width:25px;
height:25px;
background:#ff0000;
border-radius:50%;
z-index:9999;
pointer-events:none;
transition:all 0.8s ease;
}

</style>
</head>
<body>

<header>🍣 DIVINO SUSHI 🍤</header>

<div id="produtos"></div>

<div id="carrinho">

<h2>🛒 Meu Pedido (<span id="contadorItens">0</span>)</h2>

<div id="listaCarrinho"></div>

<button onclick="limparCarrinho()">Limpar Carrinho</button>

<h3>Entrega</h3>

<select id="tipoEntrega" onchange="atualizarTaxa()">
<option value="cidade">Cidade</option>
<option value="sitio">Sítio</option>
<option value="retirada">Retirada no Local</option>
</select>

<select id="cidade" onchange="atualizarTaxa()">
<option value="carrapateira">Carrapateira</option>
<option value="outra">Outra Cidade</option>
</select>

<p id="taxaEntrega">Taxa: R$ 0</p>

<h3>Informações do Cliente</h3>

<input type="text" id="nomeCliente" placeholder="Seu Nome">
<input type="text" id="rua" placeholder="Rua e Número">
<input type="text" id="bairro" placeholder="Bairro">
<input type="text" id="referencia" placeholder="Ponto de Referência">

<p class="total">Total: R$ <span id="total">0</span></p>

<h3>Forma de Pagamento</h3>

<select id="pagamento">
<option value="pix">Pix</option>
<option value="dinheiro">Dinheiro</option>
</select>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

<div id="areaPix">
<p><strong>Chave Pix:</strong></p>
<input type="text" id="chavePix" value="74999403009" readonly>
<button onclick="copiarPix()">Copiar Chave Pix</button>
<p>Após realizar o pagamento clique abaixo:</p>
<button onclick="enviarPedido()">Já fiz o Pix</button>
</div>

</div>

<button id="btnCarrinho" onclick="irParaCarrinho()">
🛒 <span id="contadorCarrinho">0</span>
</button>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let taxa = 0;

const categorias={
"Peças":[
{nome:"Joy Camarão Especial",preco:5},
{nome:"Joy Salmão com Cream Cheese",preco:4.5}
]
};

function gerarId(nome){
return nome.replace(/\s/g,"");
}

function carregarProdutos(){

const container=document.getElementById("produtos");

for(let categoria in categorias){

container.innerHTML+=`<div class="categoria"><h2>${categoria}</h2><div class="grid" id="${categoria}"></div></div>`;

categorias[categoria].forEach(produto=>{

const id=gerarId(produto.nome);

document.getElementById(categoria).innerHTML+=`

<div class="produto">

<div class="produto-content">

<h3>${produto.nome}</h3>

<p>R$ ${produto.preco.toFixed(2)}</p>

<div class="controleProduto">

<button class="btnQtd" onclick="alterarQtd('${id}',-1)">−</button>

<span class="qtdProduto" id="qtd_${id}">1</span>

<button class="btnQtd" onclick="alterarQtd('${id}',1)">+</button>

</div>

<button onclick='animar(event); adicionar("${produto.nome}",${produto.preco},"${id}")'>
Adicionar
</button>

</div>

</div>

`;
});
}

}

function alterarQtd(id,valor){

let span=document.getElementById("qtd_"+id);

let qtd=parseInt(span.innerText);

qtd+=valor;

if(qtd<1)qtd=1;

span.innerText=qtd;

}

function adicionar(nome,preco,id){

let qtd=parseInt(document.getElementById("qtd_"+id).innerText);

let item=carrinho.find(i=>i.nome===nome);

if(item){
item.qtd+=qtd;
}else{
carrinho.push({nome,preco,qtd});
}

salvarCarrinho();

atualizarCarrinho();

}

function salvarCarrinho(){

localStorage.setItem("carrinho",JSON.stringify(carrinho));

}

function animar(event){

const btn=document.getElementById("btnCarrinho");

const bola=document.createElement("div");

bola.className="animacao";

bola.style.left=event.clientX+"px";
bola.style.top=event.clientY+"px";

document.body.appendChild(bola);

let destino=btn.getBoundingClientRect();

setTimeout(()=>{
bola.style.left=destino.left+"px";
bola.style.top=destino.top+"px";
bola.style.transform="scale(0.1)";
bola.style.opacity="0";
},10);

setTimeout(()=>{
bola.remove();
},800);

}

function atualizarCarrinho(){

let total=0;
let lista="";
let itens=0;

carrinho.forEach((item,index)=>{

lista+=`

<div style="margin-bottom:8px">

${item.nome} x${item.qtd}

<button onclick="remover(${index})">❌</button>

</div>

`;

total+=item.preco*item.qtd;

itens+=item.qtd;

});

total+=taxa;

document.getElementById("listaCarrinho").innerHTML=lista;

document.getElementById("total").innerText=total.toFixed(2);

document.getElementById("contadorItens").innerText=itens;

document.getElementById("contadorCarrinho").innerText=itens;

salvarCarrinho();

}

function remover(index){

carrinho.splice(index,1);

atualizarCarrinho();

}

function limparCarrinho(){

carrinho=[];

atualizarCarrinho();

}

function irParaCarrinho(){

document.getElementById("carrinho").scrollIntoView({behavior:"smooth"});

}

carregarProdutos();

atualizarCarrinho();

</script>

</body>
</html>
