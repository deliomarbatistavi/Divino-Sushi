```html
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divino Sushi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Noto Serif JP', serif;
background:linear-gradient(#0f0f0f,#1a0000);
color:#fff;
}

header{
background:linear-gradient(90deg,#8B0000,#000);
padding:25px;
text-align:center;
font-size:32px;
letter-spacing:3px;
border-bottom:2px solid #b30000;
}

.categoria{
margin:40px 20px 20px 20px;
}

.categoria h2{
border-left:5px solid #b30000;
padding-left:10px;
font-size:22px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.produto{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
transition:0.4s;
box-shadow:0 0 15px rgba(179,0,0,0.2);
}

.produto:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.produto img{
width:100%;
height:180px;
object-fit:cover;
}

.produto-content{
padding:15px;
}

.contador-produto{
font-size:13px;
margin-top:5px;
color:#ffcccc;
}

button{
background:#b30000;
color:white;
border:none;
padding:10px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
width:100%;
}

button:hover{
background:#ff0000;
}

select,input{
width:100%;
padding:8px;
margin-top:8px;
border-radius:5px;
border:none;
}

#carrinho{
background:#111;
padding:20px;
margin-top:40px;
border-top:2px solid #b30000;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

#areaPix{
display:none;
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.controle-qtd{
display:flex;
align-items:center;
gap:10px;
margin-top:8px;
}

.btn-qtd{
background:#b30000;
border:none;
color:white;
font-size:18px;
width:35px;
height:35px;
border-radius:6px;
cursor:pointer;
}

.input-qtd{
text-align:center;
font-weight:bold;
}

width:30px;

background:#ff0000;

}

</style>
</head>

<body>

<header>🍣 DIVINO SUSHI 🍤</header>

<div id="produtos"></div>

<div id="carrinho">

<h2>🛒 Meu Pedido (<span id="contadorItens">0</span>)</h2>

<div id="listaCarrinho"></div>

<button onclick="limparCarrinho()">Limpar Carrinho</button>

<h3>Entrega</h3>

<select id="tipoEntrega" onchange="atualizarTaxa()">
<option value="cidade">Cidade</option>
<option value="sitio">Sítio</option>
<option value="retirada">Retirada no Local</option>
</select>

<select id="cidade" onchange="atualizarTaxa()">
<option value="carrapateira">Carrapateira</option>
<option value="outra">Outra Cidade</option>
</select>

<p id="taxaEntrega">Taxa: R$ 0</p>

<h3>Informações do Cliente</h3>

<input type="text" id="nomeCliente" placeholder="Seu Nome">
<input type="text" id="rua" placeholder="Rua e Número">
<input type="text" id="bairro" placeholder="Bairro">
<input type="text" id="referencia" placeholder="Ponto de Referência">

<p class="total">Total: R$ <span id="total">0</span></p>

<h3>Forma de Pagamento</h3>

<select id="pagamento">
<option value="pix">Pix</option>
<option value="dinheiro">Dinheiro</option>
</select>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

<div id="areaPix">

<p><strong>Chave Pix:</strong></p>

<input type="text" id="chavePix" value="74999403009" readonly>

<button onclick="copiarPix()">Copiar Chave Pix</button>

<p>Após realizar o pagamento clique abaixo:</p>

<button onclick="enviarPedido()">Já fiz o Pix</button>

</div>

</div>

<div id="popupCarrinho">

<h3>🛒 Meu Pedido</h3>

<div id="listaCarrinhoPopup"></div>

<p class="total">Total: R$ <span id="totalPopup">0</span></p>

<button onclick="irParaCarrinho()">Finalizar</button>

</div>

<button id="carrinhoFlutuante" onclick="abrirCarrinho()">
🛒 <span id="contadorFlutuante">0</span>
</button>

<script>

const categorias={
"Peças":[
{nome:"Joy Camarão Especial",preco:5},
{nome:"Joy Salmão com Cream Cheese",preco:4.5}
]
};

let carrinho=[];
let taxa=0;

function gerarId(nome){
return nome.replace(/\s/g,'');
}

function gerarNomeImagem(nome){
return "imagens/"+nome.toLowerCase().replace(/ /g,"-")+".jpeg";
}

function carregarProdutos(){

const container=document.getElementById("produtos");

for(let categoria in categorias){

container.innerHTML+=`<div class="categoria"><h2>${categoria}</h2><div class="grid" id="${categoria}"></div></div>`;

categorias[categoria].forEach(produto=>{

const imagem=gerarNomeImagem(produto.nome);
const id=gerarId(produto.nome);

document.getElementById(categoria).innerHTML+=`

<div class="produto">

<img src="${imagem}" onerror="this.style.display='none'">

<div class="produto-content">

<h3>${produto.nome}</h3>

<div class="contador-produto">Peças no carrinho: <span id="contador_${id}">0</span></div>

<p>R$ ${produto.preco.toFixed(2)}</p>

<div class="controle-qtd">

<button class="btn-qtd" onclick="diminuirQtd('${id}')">−</button>

<input class="input-qtd" type="number" id="${id}" min="1" value="1">

<button class="btn-qtd" onclick="aumentarQtd('${id}')">+</button>

</div>

<button onclick='animarProduto(event); adicionar("${produto.nome}",${produto.preco},"${id}")'>Adicionar</button>

</div>

</div>

`;
});
}
}

function atualizarContadoresProdutos(){

carrinho.forEach(item=>{
const id=gerarId(item.nome);
const el=document.getElementById("contador_"+id);
if(el){
el.innerText=item.qtd;
}
});

}

function aumentarQtd(id){
const input=document.getElementById(id);
input.value=parseInt(input.value)+1;
}

function diminuirQtd(id){
const input=document.getElementById(id);
if(input.value>1){
input.value=parseInt(input.value)-1;
}
}

function animarProduto(event){

const carrinhoBtn=document.getElementById("carrinhoFlutuante");

const anim=document.createElement("div");

anim.classList.add("animacao-produto");

anim.style.left=event.clientX+"px";
anim.style.top=event.clientY+"px";

document.body.appendChild(anim);

const destino=carrinhoBtn.getBoundingClientRect();

setTimeout(()=>{
anim.style.transition="all 0.7s ease";
anim.style.left=destino.left+"px";
anim.style.top=destino.top+"px";
anim.style.transform="scale(0.1)";
anim.style.opacity="0";
},10);

setTimeout(()=>{anim.remove();},800);
}

function adicionar(nome,preco,id){

const qtd=parseInt(document.getElementById(id).value);

let item=carrinho.find(i=>i.nome===nome);

if(item){
item.qtd+=qtd;
}else{
carrinho.push({nome,preco,qtd});
}

atualizarCarrinho();
atualizarContadoresProdutos();
}

function abrirCarrinho(){
document.getElementById("popupCarrinho").style.display="block";
}

function irParaCarrinho(){
document.getElementById("carrinho").scrollIntoView({behavior:"smooth"});
}

function limparCarrinho(){
carrinho=[];
atualizarCarrinho();
}

function atualizarTaxa(){

const tipo=document.getElementById("tipoEntrega").value;
const cidade=document.getElementById("cidade").value;

if(tipo==="retirada"){taxa=0;}
else if(tipo==="cidade"){taxa=cidade==="carrapateira"?5:10;}
else if(tipo==="sitio"){taxa=15;}

document.getElementById("taxaEntrega").innerText="Taxa: R$ "+taxa;

atualizarCarrinho();
}

function copiarPix(){

const chave=document.getElementById("chavePix");

navigator.clipboard.writeText(chave.value);

alert("Chave Pix copiada!");

}

function finalizarPedido(){

const pagamento=document.getElementById("pagamento").value;

if(pagamento==="pix"){
document.getElementById("areaPix").style.display="block";
}else{
enviarPedido();
}

}

function enviarPedido(){

let msg="🍣 *Pedido Divino Sushi*%0A%0A";

carrinho.forEach(item=>{
msg+=`${item.nome} x${item.qtd}%0A`;
});

msg+=`%0ATotal: R$ ${document.getElementById("total").innerText}`;

const telefone="5599999999999";

window.open(`https://wa.me/${telefone}?text=${msg}`);

}

function atualizarCarrinho(){

let total=0;
let lista="";
let totalItens=0;

carrinho.forEach(item=>{

lista+=`<p>${item.nome} x${item.qtd}</p>`;

total+=item.preco*item.qtd;

totalItens+=item.qtd;

});

total+=taxa;

document.getElementById("contadorItens").innerText=totalItens;
document.getElementById("contadorFlutuante").innerText=totalItens;

document.getElementById("listaCarrinho").innerHTML=lista;
document.getElementById("listaCarrinhoPopup").innerHTML=lista;

document.getElementById("total").innerText=total.toFixed(2);
document.getElementById("totalPopup").innerText=total.toFixed(2);

}

carregarProdutos();

</script>

</body>
</html>
