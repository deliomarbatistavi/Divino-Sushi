<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divino Sushi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Noto Serif JP', serif;
background:linear-gradient(#0f0f0f,#1a0000);
color:#fff;
}

header{
background:linear-gradient(90deg,#8B0000,#000);
padding:25px;
text-align:center;
font-size:32px;
letter-spacing:3px;
border-bottom:2px solid #b30000;
}

.categoria{
margin:40px 20px 20px 20px;
}

.categoria h2{
border-left:5px solid #b30000;
padding-left:10px;
font-size:22px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.produto{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
transition:0.4s;
box-shadow:0 0 15px rgba(179,0,0,0.2);
}

.produto:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.produto img{
width:100%;
height:180px;
object-fit:cover;
}

.produto-content{
padding:15px;
}

button{
background:#b30000;
color:white;
border:none;
padding:10px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
width:100%;
}

button:hover{
background:#ff0000;
}

select,input{
width:100%;
padding:8px;
margin-top:8px;
border-radius:5px;
border:none;
}

#carrinho{
background:#111;
padding:20px;
margin-top:40px;
border-top:2px solid #b30000;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

#areaPix{
display:none;
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-top:15px;
}

/* ANIMAÇÃO DO PRODUTO */

.animacao-produto{
position:fixed;
width:30px;
height:30px;
background:#ff0000;
border-radius:50%;
z-index:9999;
pointer-events:none;
animation:voarCarrinho 0.8s ease forwards;
}

@keyframes voarCarrinho{
0%{
transform:scale(1);
opacity:1;
}

100%{
transform:translate(300px,600px) scale(0.1);
opacity:0;
}
}

</style>
</head>
<body>

<header>🍣 DIVINO SUSHI 🍤</header>

<div id="produtos"></div>

<div id="carrinho">
<h2>🛒 Meu Pedido (<span id="contadorItens">0</span>)</h2>
<div id="listaCarrinho"></div>

<button onclick="limparCarrinho()">Limpar Carrinho</button>

<h3>Entrega</h3>

<select id="tipoEntrega" onchange="atualizarTaxa()">
<option value="cidade">Cidade</option>
<option value="sitio">Sítio</option>
<option value="retirada">Retirada no Local</option>
</select>

<select id="cidade" onchange="atualizarTaxa()">
<option value="carrapateira">Carrapateira</option>
<option value="outra">Outra Cidade</option>
</select>

<p id="taxaEntrega">Taxa: R$ 0</p>

<h3>Informações do Cliente</h3>

<input type="text" id="nomeCliente" placeholder="Seu Nome">
<input type="text" id="rua" placeholder="Rua e Número">
<input type="text" id="bairro" placeholder="Bairro">
<input type="text" id="referencia" placeholder="Ponto de Referência">

<p class="total">Total: R$ <span id="total">0</span></p>

<h3>Forma de Pagamento</h3>
<select id="pagamento">
<option value="pix">Pix</option>
<option value="dinheiro">Dinheiro</option>
</select>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

<div id="areaPix">
<p><strong>Chave Pix:</strong></p>
<input type="text" id="chavePix" value="74999403009" readonly>
<button onclick="copiarPix()">Copiar Chave Pix</button>
<p>Após realizar o pagamento clique abaixo:</p>
<button onclick="enviarPedido()">Já fiz o Pix</button>
</div>

</div>

<script>

const horarioInicio = 11;
const horarioFim = 22;

const categorias = {
"Peças":[
{nome:"Joy Camarão Especial", preco:5},
{nome:"Joy Salmão com Cream Cheese", preco:4.5},
{nome:"Joy com Geleia de Maracujá", preco:4.5},
{nome:"Joy com Doritos e Cream Cheese", preco:4.5},
{nome:"Joy com Patê de Salmão", preco:4.5},
{nome:"Hot Roll Doritos", preco:4},
{nome:"Hot Roll de Camarão", preco:3.5},
{nome:"Hot Roll de Salmão", preco:3.5},
{nome:"Uramaki Filadélfia", preco:3.5}
],

"Temaki":[
{nome:"Temaki Filadélfia de Salmão", preco:35},
{nome:"Temaki Frito de Camarão", preco:35},
{nome:"Temaki Frito de Salmão", preco:35},
{nome:"Temaki de Salmão e Camarão", preco:40}
],

"Burgers":[
{nome:"Sushi Burger de Salmão", preco:40},
{nome:"Sushi Burger de Camarão", preco:40},
{nome:"Sushi Burger de salmão grelhado", preco:40}
],

"Big Hot":[
{nome:"Big Hot de Salmão Filadélfia", preco:35},
{nome:"Big Hot de Camarão", preco:35},
{nome:"Big Hot de Salmão e Camarão", preco:40},
{nome:"Big Hot de Salmão grelhado", preco:35}
],

"Bolinhas":[
{nome:"Bolinha de Camarão", preco:6},
{nome:"Bolinha de Salmão", preco:6}
]

};

let carrinho=[];
let taxa=0;

function gerarNomeImagem(nome){
return "imagens/"+nome.toLowerCase()
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/ /g,"-")+".jpeg";
}

function carregarProdutos(){
const container=document.getElementById("produtos");

for(let categoria in categorias){
container.innerHTML+=`<div class="categoria"><h2>${categoria}</h2><div class="grid" id="${categoria}"></div></div>`;

categorias[categoria].forEach(produto=>{
const imagem=gerarNomeImagem(produto.nome);

document.getElementById(categoria).innerHTML+=`
<div class="produto">
<img src="${imagem}" onerror="this.style.display='none'">
<div class="produto-content">
<h3>${produto.nome}</h3>
<p>R$ ${produto.preco.toFixed(2)}</p>
<input type="number" id="${produto.nome}" min="1" value="1">
<button onclick='animarProduto(event); adicionar("${produto.nome}",${produto.preco})'>Adicionar</button>
</div>
</div>`;
});
}
}

function adicionar(nome,preco){

const qtd=parseInt(document.getElementById(nome).value);

let itemExistente = carrinho.find(item => item.nome === nome);

if(itemExistente){
itemExistente.qtd += qtd;
}else{
carrinho.push({nome,preco,qtd});
}

atualizarCarrinho();
}

function animarProduto(event){
const anim=document.createElement("div");
anim.classList.add("animacao-produto");
anim.style.left=event.clientX+"px";
anim.style.top=event.clientY+"px";
document.body.appendChild(anim);
setTimeout(()=>{anim.remove();},800);
}

function aumentarItem(index){
carrinho[index].qtd++;
atualizarCarrinho();
}

function diminuirItem(index){
if(carrinho[index].qtd > 1){
carrinho[index].qtd--;
}else{
carrinho.splice(index,1);
}
atualizarCarrinho();
}

function limparCarrinho(){
carrinho=[];
atualizarCarrinho();
}

function atualizarCarrinho(){
let total=0;
let lista="";

carrinho.forEach((item,index)=>{
lista+=`
<div style="margin-bottom:8px;border-bottom:1px solid #333;padding-bottom:5px;">
<p>${item.nome}</p>
<button onclick="diminuirItem(${index})">➖</button>
<span style="margin:0 10px;">${item.qtd}</span>
<button onclick="aumentarItem(${index})">➕</button>
</div>
`;

total+=item.preco*item.qtd;
});

total+=taxa;

let totalItens=0;
carrinho.forEach(item=>{
totalItens+=item.qtd;
});

document.getElementById("contadorItens").innerText=totalItens;
document.getElementById("listaCarrinho").innerHTML=lista;
document.getElementById("total").innerText=total.toFixed(2);
}

function atualizarTaxa(){

const tipo=document.getElementById("tipoEntrega").value;
const cidade=document.getElementById("cidade").value;

if(tipo==="retirada"){
taxa=0;
}

else if(tipo==="cidade" && cidade==="carrapateira"){
taxa=5;
}

else if(tipo==="cidade" && cidade==="outra"){
taxa=10;
}

else if(tipo==="sitio"){
taxa=15;
}

document.getElementById("taxaEntrega").innerText="Taxa: R$ "+taxa;

atualizarCarrinho();
}

function copiarPix(){
const chave=document.getElementById("chavePix");
chave.select();
document.execCommand("copy");
alert("Chave Pix copiada!");
}

function validarEndereco(){
const tipo=document.getElementById("tipoEntrega").value;
if(tipo==="retirada") return true;

const nome=document.getElementById("nomeCliente").value;
const rua=document.getElementById("rua").value;
const bairro=document.getElementById("bairro").value;

if(nome===""||rua===""||bairro===""){
alert("Preencha Nome, Rua e Bairro!");
return false;
}
return true;
}

function finalizarPedido(){
const hora=new Date().getHours();
if(hora<horarioInicio||hora>=horarioFim){
alert("Funcionamos das 11h às 22h.");
return;
}
if(carrinho.length===0){
alert("Carrinho vazio!");
return;
}
if(!validarEndereco()) return;

if(document.getElementById("pagamento").value==="pix"){
document.getElementById("areaPix").style.display="block";
}else{
enviarPedido();
}
}

function enviarPedido(){

let mensagem="🍣 *Novo Pedido - Divino Sushi* 🍤\n\n";

const tipo=document.getElementById("tipoEntrega").value;
const nome=document.getElementById("nomeCliente").value;
const rua=document.getElementById("rua").value;
const bairro=document.getElementById("bairro").value;
const referencia=document.getElementById("referencia").value;

mensagem+=`Cliente: ${nome}\n`;

if(tipo!=="retirada"){
mensagem+=`Endereço: ${rua}, ${bairro}\n`;
mensagem+=`Referência: ${referencia}\n`;
}else{
mensagem+=`Retirada no Local\n`;
}

mensagem+="\nItens:\n";

carrinho.forEach(item=>{
mensagem+=`${item.nome} x${item.qtd}\n`;
});

mensagem+=`\nTaxa: R$ ${taxa}`;
mensagem+=`\nTotal: R$ ${document.getElementById("total").innerText}`;

const numero="5583993848611";

window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`,"_blank");
}

carregarProdutos();

</script>

</body>
</html>
