<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Divino Sushi</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&display=swap');

html{scroll-behavior:smooth;}

body{
margin:0;
font-family:'Noto Serif JP', serif;
background:linear-gradient(#0f0f0f,#1a0000);
color:#fff;
}

header{
background:linear-gradient(90deg,#8B0000,#000);
padding:25px;
text-align:center;
font-size:32px;
letter-spacing:3px;
border-bottom:2px solid #b30000;
}

.busca{
padding:15px;
text-align:center;
background:#111;
}

#buscaProduto{
width:90%;
max-width:400px;
padding:10px;
border-radius:6px;
border:none;
}

.categoria{
margin:40px 20px 20px 20px;
}

.categoria h2{
border-left:5px solid #b30000;
padding-left:10px;
font-size:22px;
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.produto{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
transition:0.4s;
box-shadow:0 0 15px rgba(179,0,0,0.2);
}

.produto:hover{
transform:translateY(-5px);
box-shadow:0 0 25px rgba(255,0,0,0.4);
}

.produto img{
width:100%;
height:180px;
object-fit:cover;
}

.produto-content{
padding:15px;
}

button{
background:#b30000;
color:white;
border:none;
padding:10px;
margin-top:8px;
cursor:pointer;
border-radius:6px;
transition:0.3s;
width:100%;
}

button:hover{
background:#ff0000;
}

/* CONTROLE DE QUANTIDADE NO PRODUTO */

.controle-qtd{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-top:8px;
}

.btn-qtd{
width:35px;
height:35px;
border-radius:50%;
border:none;
background:#b30000;
color:#fff;
font-size:18px;
cursor:pointer;
}

select,input{
width:100%;
padding:8px;
margin-top:8px;
border-radius:5px;
border:none;
}

#carrinho{
background:#111;
padding:20px;
margin-top:40px;
border-top:2px solid #b30000;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

#areaPix{
display:none;
background:#1a1a1a;
padding:15px;
border-radius:10px;
margin-top:15px;
}

.animacao-produto{
position:fixed;
width:30px;
height:30px;
background:#ff0000;
border-radius:50%;
z-index:9999;
pointer-events:none;
animation:voarCarrinho 0.8s ease forwards;
}

@keyframes voarCarrinho{
0%{transform:scale(1);opacity:1;}
100%{transform:translate(300px,600px) scale(0.1);opacity:0;}
}

#carrinhoFlutuante{
position:fixed;
bottom:20px;
right:20px;
background:#b30000;
color:white;
border:none;
border-radius:50px;
padding:15px 20px;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px rgba(0,0,0,0.5);
z-index:9999;
width:auto;
}

#contadorFlutuante{
background:white;
color:#b30000;
border-radius:50%;
padding:3px 8px;
margin-left:6px;
font-weight:bold;
}

#notificacao{
position:fixed;
top:20px;
right:20px;
background:#b30000;
padding:12px 18px;
border-radius:8px;
display:none;
z-index:9999;
}

</style>
</head>

<body>

<header>🍣 DIVINO SUSHI 🍤</header>

<div class="busca">
<input type="text" id="buscaProduto" placeholder="Buscar produto..." onkeyup="buscarProduto()">
</div>

<div id="produtos"></div>

<div id="carrinho">
<h2>🛒 Meu Pedido (<span id="contadorItens">0</span>)</h2>
<div id="listaCarrinho"></div>

<button onclick="limparCarrinho()">Limpar Carrinho</button>

<h3>Entrega</h3>

<select id="tipoEntrega" onchange="atualizarTaxa()">
<option value="cidade">Cidade</option>
<option value="sitio">Sítio</option>
<option value="retirada">Retirada no Local</option>
</select>

<select id="cidade" onchange="atualizarTaxa()">
<option value="carrapateira">Carrapateira</option>
<option value="outra">Outra Cidade</option>
</select>

<p id="taxaEntrega">Taxa: R$ 0</p>

<h3>Informações do Cliente</h3>

<input type="text" id="nomeCliente" placeholder="Seu Nome">
<input type="text" id="rua" placeholder="Rua e Número">
<input type="text" id="bairro" placeholder="Bairro">
<input type="text" id="referencia" placeholder="Ponto de Referência">

<p class="total">Total: R$ <span id="total">0</span></p>

<h3>Forma de Pagamento</h3>

<select id="pagamento">
<option value="pix">Pix</option>
<option value="dinheiro">Dinheiro</option>
</select>

<button onclick="finalizarPedido()">Finalizar Pedido</button>

<div id="areaPix">
<p><strong>Chave Pix:</strong></p>
<input type="text" id="chavePix" value="74999403009" readonly>
<button onclick="copiarPix()">Copiar Chave Pix</button>
<p>Após realizar o pagamento clique abaixo:</p>
<button onclick="enviarPedido()">Já fiz o Pix</button>
</div>

</div>

<button id="carrinhoFlutuante" onclick="document.getElementById('carrinho').scrollIntoView({behavior:'smooth'})">
🛒 <span id="contadorFlutuante">0</span>
</button>

<div id="notificacao">Produto adicionado!</div>

<script>

const horarioInicio = 11;
const horarioFim = 22;

let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let taxa=0;

/* CONTROLE DE QUANTIDADE */

function aumentarQtd(id){
let campo=document.getElementById(id);
campo.value=parseInt(campo.value)+1;
}

function diminuirQtd(id){
let campo=document.getElementById(id);
if(campo.value>1){
campo.value=parseInt(campo.value)-1;
}
}

/* PRODUTOS */

const categorias={

"Peças":[
{nome:"Joy Camarão Especial",preco:5},
{nome:"Joy Salmão com Cream Cheese",preco:4.5},
{nome:"Joy com Geleia de Maracujá",preco:4.5},
{nome:"Joy com Doritos e Cream Cheese",preco:4.5},
{nome:"Joy com Patê de Salmão",preco:4.5},
{nome:"Hot Roll Doritos",preco:4},
{nome:"Hot Roll de Camarão",preco:3.5},
{nome:"Hot Roll de Salmão",preco:3.5},
{nome:"Uramaki Filadélfia",preco:3.5}
],

"Temaki":[
{nome:"Temaki Filadélfia de Salmão",preco:35},
{nome:"Temaki Frito de Camarão",preco:35},
{nome:"Temaki Frito de Salmão",preco:35},
{nome:"Temaki de Salmão e Camarão",preco:40}
],

"Burgers":[
{nome:"Sushi Burger de Salmão",preco:40},
{nome:"Sushi Burger de Camarão",preco:40},
{nome:"Sushi Burger de salmão grelhado",preco:40}
],

"Big Hot":[
{nome:"Big Hot de Salmão Filadélfia",preco:35},
{nome:"Big Hot de Camarão",preco:35},
{nome:"Big Hot de Salmão e Camarão",preco:40},
{nome:"Big Hot de Salmão grelhado",preco:35}
],

"Bolinhas":[
{nome:"Bolinha de Camarão",preco:6},
{nome:"Bolinha de Salmão",preco:6}
]

};

/* FOTO AUTOMÁTICA */

function gerarNomeImagem(nome){
return "imagens/"+nome.toLowerCase()
.normalize("NFD").replace(/[\u0300-\u036f]/g,"")
.replace(/ /g,"-")+".jpeg";
}

/* CARREGAR PRODUTOS */

function carregarProdutos(){

const container=document.getElementById("produtos");

for(let categoria in categorias){

container.innerHTML+=`<div class="categoria"><h2>${categoria}</h2><div class="grid" id="${categoria}"></div></div>`;

categorias[categoria].forEach(produto=>{

const imagem=gerarNomeImagem(produto.nome);

document.getElementById(categoria).innerHTML+=`

<div class="produto">

<img src="${imagem}" onerror="this.style.display='none'">

<div class="produto-content">

<h3>${produto.nome}</h3>

<p>R$ ${produto.preco.toFixed(2)}</p>

<div class="controle-qtd">

<button class="btn-qtd" onclick="diminuirQtd('${produto.nome}')">➖</button>

<input type="number" id="${produto.nome}" min="1" value="1">

<button class="btn-qtd" onclick="aumentarQtd('${produto.nome}')">➕</button>

</div>

<button onclick="adicionar('${produto.nome}',${produto.preco})">Adicionar</button>

</div>

</div>

`;

});

}

}

carregarProdutos();

/* RESTO DO CÓDIGO ORIGINAL */

function buscarProduto(){
let filtro=document.getElementById("buscaProduto").value.toLowerCase();
let produtos=document.querySelectorAll(".produto");

produtos.forEach(produto=>{
let nome=produto.innerText.toLowerCase();
produto.style.display = nome.includes(filtro) ? "block" : "none";
});
}

function mostrarNotificacao(){
const n=document.getElementById("notificacao");
n.style.display="block";
setTimeout(()=>{n.style.display="none";},1500);
}

function salvarCarrinho(){
localStorage.setItem("carrinho",JSON.stringify(carrinho));
}

function adicionar(nome,preco){

const qtd=parseInt(document.getElementById(nome).value);

let itemExistente = carrinho.find(item => item.nome === nome);

if(itemExistente){
itemExistente.qtd += qtd;
}else{
carrinho.push({nome,preco,qtd});
}

mostrarNotificacao();

salvarCarrinho();

atualizarCarrinho();
}

function aumentarItem(index){
carrinho[index].qtd++;
atualizarCarrinho();
}

function diminuirItem(index){
if(carrinho[index].qtd>1){
carrinho[index].qtd--;
}else{
carrinho.splice(index,1);
}
atualizarCarrinho();
}

function limparCarrinho(){
carrinho=[];
atualizarCarrinho();
}

function atualizarCarrinho(){

let total=0;
let lista="";
let totalItens=0;

carrinho.forEach((item,index)=>{

lista+=`
<div style="margin-bottom:8px;border-bottom:1px solid #333;padding-bottom:5px;">
<p>${item.nome}</p>
<button onclick="diminuirItem(${index})">➖</button>
<span style="margin:0 10px;">${item.qtd}</span>
<button onclick="aumentarItem(${index})">➕</button>
</div>
`;

total+=item.preco*item.qtd;
totalItens+=item.qtd;

});

total+=taxa;

document.getElementById("contadorItens").innerText=totalItens;
document.getElementById("contadorFlutuante").innerText=totalItens;
document.getElementById("listaCarrinho").innerHTML=lista;
document.getElementById("total").innerText=total.toFixed(2);

salvarCarrinho();

}

</script>

</body>
</html>
